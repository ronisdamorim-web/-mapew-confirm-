<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conta Confirmada – Mapew</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0066FF 0%, #00B341 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.93); }
      to   { opacity: 1; transform: scale(1); }
    }

    .check-circle {
      width: 72px;
      height: 72px;
      background: #e8f9ef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    @keyframes popIn {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    .check-circle svg {
      width: 40px;
      height: 40px;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      color: #0066FF;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #6B7280;
      line-height: 1.6;
    }

    .extra {
      font-size: 14px;
      font-weight: 600;
      color: #0066FF;
      margin-top: 20px;
      padding: 12px 16px;
      background: #EFF6FF;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .extra.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">mapew</div>

    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00B341" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5" />
      </svg>
    </div>

    <h1>Conta confirmada com sucesso!</h1>

    <p class="subtitle">
      Seu e-mail foi verificado.<br />
      Você pode fechar esta página e<br />
      voltar ao app para fazer login.
    </p>

    <p class="extra" id="extra">
      Você já pode voltar para o aplicativo.
    </p>
  </div>

  <script>
    setTimeout(function () {
      document.getElementById('extra').classList.add('visible');
    }, 3000);
  </script>
</body>
</html>
